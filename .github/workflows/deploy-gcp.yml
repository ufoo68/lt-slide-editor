name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run Prisma migrations before deploying
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Prepare image name
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Build container image
        run: gcloud builds submit --tag "${IMAGE}" .

      - name: Run database migrations
        if: github.event_name == 'push' || github.event.inputs.run_migrations == 'true'
        run: |
          JOB="${SERVICE}-migrate"
          gcloud run jobs deploy "${JOB}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --set-secrets DATABASE_URL=DATABASE_URL:latest,DIRECT_URL=DIRECT_URL:latest \
            --command npm \
            --args run \
            --args prisma:deploy
          gcloud run jobs execute "${JOB}" \
            --region "${REGION}" \
            --wait

      - name: Deploy service
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars NEXT_PUBLIC_FIREBASE_API_KEY="${NEXT_PUBLIC_FIREBASE_API_KEY}" \
            --set-env-vars NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}" \
            --set-env-vars NEXT_PUBLIC_FIREBASE_PROJECT_ID="${NEXT_PUBLIC_FIREBASE_PROJECT_ID}" \
            --set-env-vars NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}" \
            --set-env-vars FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID}" \
            --set-env-vars STORAGE_BACKEND=gcs \
            --set-env-vars GCS_BUCKET_NAME="${GCS_BUCKET_NAME}" \
            --set-secrets DATABASE_URL=DATABASE_URL:latest
