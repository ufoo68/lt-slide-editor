services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lt_slide_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lt_slide_editor"]
      interval: 2s
      timeout: 5s
      retries: 30

  firebase-auth:
    build:
      context: .
      dockerfile: Dockerfile.firebase
    ports:
      - "4000:4000"
      - "9099:9099"
    volumes:
      - ./firebase.json:/workspace/firebase.json:ro

volumes:
  postgres-data:
