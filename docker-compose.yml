name: lt-slide-editor

services:
  firebase:
    build:
      context: .
      dockerfile: Dockerfile.firebase
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
    volumes:
      - ./firebase.json:/workspace/firebase.json:ro
      - firebase-data:/workspace/firebase-data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000 >/dev/null"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/lt-slide-editor || true;
      "

volumes:
  firebase-data:
    name: lt-slide-editor_firebase-data
  minio-data:
    name: lt-slide-editor_minio-data
