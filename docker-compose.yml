services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lt_slide_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lt_slide_editor"]
      interval: 2s
      timeout: 5s
      retries: 30

  firebase-auth:
    build:
      context: .
      dockerfile: Dockerfile.firebase
    ports:
      - "4000:4000"
      - "9099:9099"
    volumes:
      - ./firebase.json:/workspace/firebase.json:ro
      - firebase-auth-data:/workspace/firebase-data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/lt-slide-editor || true;
      "

volumes:
  postgres-data:
  firebase-auth-data:
  minio-data:
